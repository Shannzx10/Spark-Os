set timeout=3
set default=0
set gfxpayload=1024x768x16,1024x768

menuentry "Spark OS v1.0" {
    linux  /boot/vmlinuz quiet init=/sbin/init console=tty0 console=ttyS0,115200
    initrd /boot/initrd.img
}

menuentry "Spark OS v1.0 (verbose)" {
    linux  /boot/vmlinuz init=/sbin/init console=tty0 console=ttyS0,115200
    initrd /boot/initrd.img
}
